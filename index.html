const isTablet = window.innerWidth >= 500 && window.innerWidth < 1024;

// Helpers
const toTitleCase = (s) => s ? s.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase()).replace(/'\w/g, t => t.toUpperCase()) : s;
const smartTitleCase = (s) => s ? s.trim().replace(/\s+/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') : s;

// Local stat snapshot store (overwrite on each check)
const SNAPSHOT_KEY = (id) => 'pw_stats_' + id;
const saveStatSnapshot = (id, snap) => { if (!id || !snap) return; try { localStorage.setItem(SNAPSHOT_KEY(id), JSON.stringify(snap)); } catch(e) {} };
const getStatSnapshot = (id) => { if (!id) return null; try { const raw = localStorage.getItem(SNAPSHOT_KEY(id)); return raw ? JSON.parse(raw) : null; } catch(e) { return null; } };
const deleteStatSnapshot = (id) => { if (!id) return; try { localStorage.removeItem(SNAPSHOT_KEY(id)); } catch(e) {} };
const buildSnapshot = (overview) => {
  if (!overview) return null;
  // Backend returns { athlete, overview, bio, stats, gamelog }
  // ESPN's /athletes/{id} response wraps everything under another "athlete" key,
  // so the actual fields live at overview.athlete.athlete.* and overview.athlete.team etc.
  const athleteRoot = overview.athlete || {};
  const ath = athleteRoot.athlete || athleteRoot;
  const ov = overview.overview || {};
  const st = overview.stats || {};
  const flat = {
    displayName: ath.displayName || ath.fullName || '',
    team: athleteRoot.team || ath.team || (ov.athlete && ov.athlete.team) || null,
    position: athleteRoot.position || ath.position || (ov.athlete && ov.athlete.position) || null,
    status: athleteRoot.status || ath.status || (ov.athlete && ov.athlete.status) || null,
    news: ov.news || athleteRoot.news || ath.news || [],
    nextEvent: ov.nextEvent || athleteRoot.nextEvent || ath.nextEvent || [],
    statistics: st || ov.statistics || athleteRoot.statistics || null,
    injuries: athleteRoot.injuries || ath.injuries || (ov.athlete && ov.athlete.injuries) || [],
  };
  const status = flat.status || {};
  const statusText = (status.type && (status.type.description || status.type.name)) || status.name || '';
  const news0 = flat.news && flat.news.length > 0 ? flat.news[0] : null;
  const next0 = flat.nextEvent && flat.nextEvent.length > 0 ? flat.nextEvent[0] : null;
  const inj0 = flat.injuries && flat.injuries.length > 0 ? flat.injuries[0] : null;
  return {
    overview: flat,
    statusText: statusText,
    newsHeadline: news0 ? (news0.headline || news0.description || '') : '',
    newsPublished: news0 ? (news0.published || '') : '',
    nextEventDate: next0 ? (next0.date || '') : '',
    injuryHeadline: inj0 ? (inj0.shortComment || inj0.longComment || inj0.description || '') : '',
    injuryStatus: inj0 ? (inj0.status || (inj0.type && inj0.type.description) || '') : '',
    capturedAt: Date.now()
  };
};
const snapshotChanged = (oldSnap, newSnap) => {
  if (!oldSnap || !newSnap) return true;
  if (oldSnap.statusText !== newSnap.statusText) return true;
  if (oldSnap.newsHeadline !== newSnap.newsHeadline) return true;
  if (oldSnap.newsPublished !== newSnap.newsPublished) return true;
  if (oldSnap.nextEventDate !== newSnap.nextEventDate) return true;
  return false;
};

// ESPN (via Player Watch backend proxy — bypasses browser CORS)
const LEAGUE_TO_SPORT = {
  nfl: 'football', ncaaf: 'football',
  nba: 'basketball', wnba: 'basketball', ncaab: 'basketball', ncaam: 'basketball', ncaaw: 'basketball',
  mlb: 'baseball',
  nhl: 'hockey',
  mls: 'soccer', 'eng.1': 'soccer', 'esp.1': 'soccer', 'ita.1': 'soccer', 'ger.1': 'soccer', 'fra.1': 'soccer'
};
const fetchEspnPlayers = async (name) => {
  try {
    const url = API_BASE + '/espn/search?name=' + encodeURIComponent(name) + '&limit=10';
    const r = await fetch(url);
    if (!r.ok) return [];
    const data = await r.json();
    const groups = (data && data.results) || [];
    var athletes = [];
    for (var i = 0; i < groups.length; i++) {
      var g = groups[i];
      if (g.type === 'player' || g.type === 'athlete') athletes = athletes.concat(g.contents || []);
    }
    return athletes.map(function(a) {
      // ESPN encodes league AND athlete ID in the link URL (e.g. /mlb/player/_/id/33192/...)
      var href = (a.link && a.link.web && a.link.web.href) || (a.links && a.links[0] && a.links[0].href) || '';
      var leagueMatch = href.match(/espn\.com\/([a-z0-9.]+)\/(?:player|athlete)/i);
      var league = leagueMatch ? leagueMatch[1].toLowerCase() : (a.defaultLeagueSlug || a.league || '');
      var sport = LEAGUE_TO_SPORT[league] || a.defaultSportSlug || a.sport || '';
      // Extract integer athlete ID — ESPN's uid format is "s:20~l:28~a:3139477"
      // a.id is a GUID and won't work for athlete endpoints
      var athleteId = '';
      if (a.uid) {
        var uidMatch = a.uid.match(/~a:(\d+)/);
        if (uidMatch) athleteId = uidMatch[1];
      }
      if (!athleteId) {
        var idMatch = href.match(/\/id\/(\d+)/);
        if (idMatch) athleteId = idMatch[1];
      }
      return {
        id: athleteId,
        displayName: a.displayName || (a.athlete && a.athlete.displayName) || a.name || '',
        sport: sport,
        league: league,
        team: (a.team && a.team.displayName) || (a.subtitle) || '',
        position: (a.position && a.position.displayName) || (a.athlete && a.athlete.position && a.athlete.position.displayName) || '',
        headshot: (a.image && a.image.default) || (a.image && a.image.url) || (a.athlete && a.athlete.headshot && a.athlete.headshot.href) || '',
        raw: a
      };
    });
  } catch(e) { return []; }
};
const fetchEspnOverview = async (sport, league, id) => {
  if (!sport || !league || !id) return null;
  try {
    const url = API_BASE + '/espn/overview?sport=' + encodeURIComponent(sport) + '&league=' + encodeURIComponent(league) + '&id=' + encodeURIComponent(id);
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
};

// Wikipedia
const fetchWikiBio = async (name) => {
  try {
    const sum = await (await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(name))).json();
    if (!sum || sum.type === 'no-extract' || !sum.title) return null;
    return { title: sum.title, thumbnail: sum.thumbnail ? sum.thumbnail.source : null, extract: sum.extract || '', description: sum.description || '' };
  } catch(e) { return null; }
};

const HeartIcon = () => (<svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>);
const InfoIcon = () => (<svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>);
const BellIcon = ({ red }) => (<svg className="w-7 h-7" fill="none" stroke={red ? 'var(--pw-accent-2)' : 'currentColor'} viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>);
const PlusIcon = () => (<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>);
const TrashIcon = () => (<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>);
const CheckIcon = () => (<svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>);
const RefreshIcon = () => (<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>);
const EyeIcon = () => (<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>);
const EyeOffIcon = () => (<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>);

const ClearableInput = ({ value, onChange, onBlur, onKeyPress, placeholder, type='text', maxLength, inputClass }) => (
  <div className="relative">
    <input type={type} placeholder={placeholder} value={value} onChange={onChange} onBlur={onBlur} onKeyPress={onKeyPress} maxLength={maxLength} className={inputClass + ' pr-10'} autoCorrect="off" autoCapitalize="words" autoComplete="off" spellCheck="false" />
    {value && value.length > 0 && (<button onClick={() => onChange({ target: { value: '' } })} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white text-xl font-bold leading-none" type="button">X</button>)}
  </div>
);

const CardPageHeader = ({ title, subtitle }) => (
  <div className="mb-3 pb-2 border-b border-white/15 text-center">

const PageWrapper = ({ children }) => (
  <div style={{ minHeight: '100dvh', width: '100%', position: 'relative', paddingTop: 'env(safe-area-inset-top)', paddingBottom: '5rem', backgroundImage: 'var(--pw-bg-gradient)', backgroundSize: 'cover', backgroundAttachment: 'scroll' }}>

  </div>
);

const StatPanel = ({ overview }) => {
  if (!overview) return <p className="text-gray-300 text-xl text-center py-3">No stats available right now.</p>;
  const status = overview.status || (overview.athlete && overview.athlete.status) || {};
  const statusText = (status.type && (status.type.description || status.type.name)) || status.name || '';
  const team = (overview.team && overview.team.displayName) || (overview.athlete && overview.athlete.team && overview.athlete.team.displayName) || '';
  const position = (overview.position && overview.position.displayName) || (overview.athlete && overview.athlete.position && overview.athlete.position.displayName) || '';
  const news = (overview.news && overview.news.length > 0 && overview.news[0]) || null;
  const nextEvent = (overview.nextEvent && overview.nextEvent.length > 0 && overview.nextEvent[0]) || null;
  const stats = (overview.statistics && (overview.statistics.categories || (overview.statistics.splits && overview.statistics.splits.categories))) || [];
  const injury = (overview.injuries && overview.injuries.length > 0 && overview.injuries[0]) || null;
  const statusLower = (statusText || '').toLowerCase();
  var badgeColor = 'bg-green-700';
  if (statusLower.indexOf('out') >= 0 || statusLower.indexOf('injured') >= 0 || statusLower.indexOf('ir') >= 0) badgeColor = 'bg-red-700';
  else if (statusLower.indexOf('quest') >= 0 || statusLower.indexOf('doubt') >= 0) badgeColor = 'bg-yellow-600';
  else if (statusLower.indexOf('retired') >= 0) badgeColor = 'bg-gray-700';
  return (
    <div className="space-y-3">
      {statusText && (<div className={'px-4 py-2 rounded-xl text-center ' + badgeColor}><p className="text-white font-black text-2xl">{statusText.toUpperCase()}</p></div>)}
      {injury && (injury.longComment || injury.shortComment || injury.description) && (
        <div className="bg-red-950/40 border border-red-700/40 rounded-xl p-3">
          <p className="text-red-300 text-sm font-bold mb-1">Injury Report{injury.status ? ' — ' + injury.status : ''}</p>
          <p className="text-white text-base leading-snug">{injury.longComment || injury.shortComment || injury.description}</p>
          {injury.date && <p className="text-gray-400 text-xs mt-1">{new Date(injury.date).toLocaleDateString()}</p>}
        </div>
      )}
      {(team || position) && (<div className="flex justify-between text-white text-xl">{team && <span><span className="text-gray-400">Team:</span> <strong>{team}</strong></span>}{position && <span><span className="text-gray-400">Pos:</span> <strong>{position}</strong></span>}</div>)}
      {nextEvent && (
        <div className="bg-black/30 border border-white/10 rounded-xl p-3">
          <p className="text-gray-400 text-sm mb-1">Next Matchup</p>
          <p className="text-white text-xl font-bold">{nextEvent.name || (nextEvent.competitions && nextEvent.competitions[0] && nextEvent.competitions[0].competitors && nextEvent.competitions[0].competitors.map(c => c.team && c.team.displayName).filter(Boolean).join(' vs ')) || ''}</p>
          {nextEvent.date && <p className="text-gray-300 text-base">{new Date(nextEvent.date).toLocaleString()}</p>}
        </div>
      )}
      {stats.length > 0 && (
        <div className="bg-black/30 border border-white/10 rounded-xl p-3">
          <p className="text-gray-400 text-sm mb-2">Season Stats</p>
          {stats.slice(0, 3).map((cat, i) => {
            const labels = cat.labels || cat.names || [];
            const seasonRows = cat.statistics || [];
            const latestRow = seasonRows.length > 0 ? seasonRows[seasonRows.length - 1] : null;
            const values = (latestRow && latestRow.stats) || [];
            const seasonYear = latestRow && latestRow.season ? (latestRow.season.displayName || latestRow.season.year) : '';
            const pairs = labels.map((lbl, idx) => ({ label: lbl, value: values[idx] })).filter(p => p.value !== undefined && p.value !== '' && p.value !== '0');
            if (pairs.length === 0) return null;
            return (
              <div key={i} className="mb-2 last:mb-0">
                {(cat.displayName || seasonYear) && <p className="text-white/70 text-base font-bold">{cat.displayName}{seasonYear ? ' — ' + seasonYear : ''}</p>}
                <div className="grid grid-cols-2 gap-2 mt-1">
                  {pairs.slice(0, 8).map((p, j) => (
                    <div key={j} className="flex justify-between text-white text-base"><span className="text-gray-400">{p.label}</span><span className="font-bold">{p.value}</span></div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {news && (
        <div className="bg-black/30 border border-white/10 rounded-xl p-3">
          <p className="text-gray-400 text-sm mb-1">Latest News</p>
          <p className="text-white text-xl font-bold leading-snug">{news.headline || news.description}</p>
          {news.published && <p className="text-gray-400 text-sm mt-1">{new Date(news.published).toLocaleDateString()}</p>}
        </div>
      )}
    </div>
  );
};

function App() {
  const [page, setPage] = useState('login');
  const [auth, setAuth] = useState(false);
  const [user, setUser] = useState(null);
  const [watchlist, setWatchlist] = useState([]);

  const [searchResults, setSearchResults] = useState(null);
  const [searched, setSearched] = useState(false);
  const [searching, setSearching] = useState(false);
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingSave, setLoadingSave] = useState(false);
  const [checkingStats, setCheckingStats] = useState(false);
  const [backendWaking, setBackendWaking] = useState(false);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [searchName, setSearchName] = useState('');
  const [showDangerZone, setShowDangerZone] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [drawerData, setDrawerData] = useState(null);
  const [autoOpenId, setAutoOpenId] = useState(null);
  const [apiVersion, setApiVersion] = useState('...');

  useEffect(() => {
    fetch(API_BASE + '/health').then(r => r.json()).then(d => setApiVersion(d.version || '?')).catch(() => setApiVersion('?'));
    const t = localStorage.getItem('token');
    const u = localStorage.getItem('user');
    if (t && u) { setUser(JSON.parse(u)); setAuth(true); setPage('search'); loadWatchlist(); loadNotifications(); }
  }, []);

  useEffect(() => {
    if (autoOpenId && page === 'myplayers' && watchlist.length > 0) {
      const wItem = watchlist.find(w => w.id === autoOpenId);
      if (wItem) { openMyPlayersDrawer(wItem); setAutoOpenId(null); }
    }
    // eslint-disable-next-line
  }, [autoOpenId, page, watchlist]);

  const loadWatchlist = async () => {
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(API_BASE + '/watchlist', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      setWatchlist(await r.json());
    } catch (e) { console.error(e); }
  };
  const loadNotifications = async () => {
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(API_BASE + '/notifications', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      setNotifications(await r.json());
    } catch (e) { console.error(e); }
  };
  const dismissAlert = async (notifId) => {
    const token = localStorage.getItem('token');
    setNotifications(prev => prev.filter(n => n.id !== notifId));
    try { await fetch(API_BASE + '/notifications/' + notifId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } }); } catch(e) {}
  };
  const viewAlert = (n) => {
    const wItem = watchlist.find(w => w.id === n.watchlist_id);
    if (wItem) { setPage('myplayers'); setAutoOpenId(wItem.id); }
  };
  const doAuth = async (authMode) => {
    if (!email || !password) return;
    setLoading(true); setBackendWaking(false);
    const wakeTimer = setTimeout(() => setBackendWaking(true), 3000);
    try {
      const endpoint = authMode === 'register' ? 'register' : 'login';
      const r = await fetch(API_BASE + '/auth/' + endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
      clearTimeout(wakeTimer); setBackendWaking(false);
      if (!r.ok) { const err = await r.json(); throw new Error(err.detail || 'Auth failed'); }
      const data = await r.json();
      localStorage.setItem('token', data.access_token);
      const u = { email, id: '123', name: email.split('@')[0] };
      localStorage.setItem('user', JSON.stringify(u));
      setUser(u); setAuth(true); setPage('search');
      loadWatchlist(); loadNotifications();
    } catch (error) { clearTimeout(wakeTimer); setBackendWaking(false); alert('Error: ' + error.message); }
    finally { setLoading(false); }
  };
  const doLogout = () => {
    localStorage.removeItem('token'); localStorage.removeItem('user');
    setAuth(false); setUser(null); setWatchlist([]); setNotifications([]);
    setSearchResults(null); setSearched(false); setSelectedPlayer(null); setPage('login');
  };
  const doDeleteAccount = async () => {
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(API_BASE + '/account', { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      doLogout(); alert('Your account has been permanently deleted.');
    } catch (error) { alert('Error: ' + error.message); }
  };
  const clearSearch = () => { setSearchResults(null); setSearched(false); setSelectedPlayer(null); setSearchName(''); };
  const isOnList = (name) => { if (!name) return false; const lower = name.trim().toLowerCase(); return !!watchlist.find(w => w && w.name && w.name.trim().toLowerCase() === lower); };
  const parseMeta = (locationField) => { if (!locationField) return null; try { return JSON.parse(locationField); } catch(e) { return null; } };

  const doSearch = async () => {
    if (document.activeElement) document.activeElement.blur();
    const name = smartTitleCase((searchName || '').trim().replace(/\s+/g, ' '));
    if (!name || name.length < 2) { alert('Please enter a player name.'); return; }
    setSearching(true); setSearchResults(null); setSelectedPlayer(null);
    try {
      const [wiki, espnPlayers] = await Promise.all([fetchWikiBio(name).catch(() => null), fetchEspnPlayers(name).catch(() => [])]);
      setSearchResults({ wiki, espnPlayers, queryName: name }); setSearched(true);
      if (espnPlayers.length === 1) setSelectedPlayer(espnPlayers[0]);
    } catch(e) { setSearchResults({ wiki: null, espnPlayers: [], queryName: name }); setSearched(true); }
    finally { setSearching(false); }
  };

  // SAVE: POST → fetch ESPN overview → store snapshot → navigate → auto-open My Players drawer
  const savePlayer = async () => {
    if (!selectedPlayer && !(searchResults && searchResults.queryName)) return;
    const playerName = selectedPlayer ? selectedPlayer.displayName : (searchResults && searchResults.queryName);
    if (!playerName) return;
    if (isOnList(playerName)) { alert(playerName + ' is already saved.'); return; }
    setLoadingSave(true);
    try {
      const token = localStorage.getItem('token');
      const meta = selectedPlayer ? JSON.stringify({
        espnId: selectedPlayer.id, sport: selectedPlayer.sport, league: selectedPlayer.league,
        team: selectedPlayer.team, position: selectedPlayer.position, headshot: selectedPlayer.headshot
      }) : '';
      const r = await fetch(API_BASE + '/watchlist', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ name: playerName, location: meta, dob: '' })
      });
      if (!r.ok) throw new Error('Failed');
      var newId = null;
      try { const created = await r.json(); newId = created.id || null; } catch(e) {}
      if (selectedPlayer && selectedPlayer.sport && selectedPlayer.league && selectedPlayer.id) {
        const overview = await fetchEspnOverview(selectedPlayer.sport, selectedPlayer.league, selectedPlayer.id).catch(() => null);
        const snap = buildSnapshot(overview);
        if (snap && newId) saveStatSnapshot(newId, snap);
      }
      await loadWatchlist();
      if (!newId) {
        // Find newest matching by name from the just-loaded list
        const fresh = (await (await fetch(API_BASE + '/watchlist', { headers: { 'Authorization': 'Bearer ' + token } })).json()).find(w => w.name && w.name.trim().toLowerCase() === playerName.trim().toLowerCase());
        if (fresh) {
          newId = fresh.id;
          // Also save snapshot under correct id if we missed earlier
          if (selectedPlayer && selectedPlayer.sport && selectedPlayer.league && selectedPlayer.id) {
            const overview2 = await fetchEspnOverview(selectedPlayer.sport, selectedPlayer.league, selectedPlayer.id).catch(() => null);
            const snap2 = buildSnapshot(overview2);
            if (snap2) saveStatSnapshot(newId, snap2);
          }
        }
      }
      clearSearch(); setPage('myplayers');
      if (newId) setAutoOpenId(newId);
    } catch(e) { alert('Error: ' + e.message); }
    finally { setLoadingSave(false); }
  };

  const delPlayer = async (id) => {
    try {
      const token = localStorage.getItem('token');
      const r = await fetch(API_BASE + '/watchlist/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
      if (!r.ok) throw new Error('Failed');
      deleteStatSnapshot(id);
      await loadWatchlist();
    } catch (error) { alert('Error: ' + error.message); }
  };

  // Watchlist drawer (light): hero + Wiki bio + Check button
  const openWatchlistDrawer = async (wItem) => {
    const meta = parseMeta(wItem.location);
    setDrawerData({ mode: 'watchlist', name: wItem.name, watchlistId: wItem.id, meta: meta, wiki: null, snapshot: null, loading: true });
    const wiki = await fetchWikiBio(wItem.name).catch(() => null);
    setDrawerData(prev => prev ? Object.assign({}, prev, { wiki: wiki, loading: false }) : null);
  };

  // My Players drawer (full): hero + Wiki bio + StatPanel from snapshot (or live fallback)
  const openMyPlayersDrawer = async (wItem) => {
    const meta = parseMeta(wItem.location);
    let snapshot = getStatSnapshot(wItem.id);
    setDrawerData({ mode: 'myplayers', name: wItem.name, watchlistId: wItem.id, meta: meta, wiki: null, snapshot: snapshot, loading: true });
    const wiki = await fetchWikiBio(wItem.name).catch(() => null);
    if (!snapshot && meta && meta.sport && meta.league && meta.espnId) {
      const overview = await fetchEspnOverview(meta.sport, meta.league, meta.espnId).catch(() => null);
      const snap = buildSnapshot(overview);
      if (snap) { saveStatSnapshot(wItem.id, snap); snapshot = snap; }
    }
    setDrawerData(prev => prev ? Object.assign({}, prev, { wiki: wiki, snapshot: snapshot, loading: false }) : null);
  };

  // Check for new stats: re-fetch, diff, transform drawer in place (no nav jump)
  const checkForNewStats = async () => {
    if (!drawerData || !drawerData.watchlistId) return;
    const meta = drawerData.meta;
    if (!meta || !meta.sport || !meta.league || !meta.espnId) { alert('No ESPN data linked to this player.'); return; }
    setCheckingStats(true);
    try {
      const overview = await fetchEspnOverview(meta.sport, meta.league, meta.espnId);
      const newSnap = buildSnapshot(overview);
      if (!newSnap) { alert('Could not reach ESPN. Try again later.'); return; }
      const oldSnap = getStatSnapshot(drawerData.watchlistId);
      if (!snapshotChanged(oldSnap, newSnap)) { alert('No new stats yet.'); return; }
      saveStatSnapshot(drawerData.watchlistId, newSnap);
      // Transform the open drawer from watchlist-mode to myplayers-mode in place.
      // User stays on whatever page they were on (Watchlist most often).
      // Closing the drawer naturally returns them to that page.
      setDrawerData(prev => prev ? Object.assign({}, prev, { mode: 'myplayers', snapshot: newSnap }) : null);
    } catch(e) { alert('Error: ' + e.message); }
    finally { setCheckingStats(false); }
  };

  const unreadCount = notifications.length;
  const iClass = "w-full px-4 py-3 border border-white/30 rounded-lg focus:ring-2 focus:ring-blue-400 text-xl bg-black/40 text-white placeholder-gray-400";
  const cardClass = "rounded-2xl p-4 shadow-lg backdrop-blur-sm";
  const cardStyle = { backgroundColor: 'var(--pw-card-bg)', borderColor: 'var(--pw-card-border)', borderWidth: '1px' };
  const containerClass = (page === 'about') ? 'w-full max-w-3xl mx-auto px-3' : 'w-full px-3';

  const PlayerCard = ({ wiki, espnPlayer, showSaveButton }) => {
    const display = espnPlayer ? espnPlayer.displayName : (wiki && wiki.title) || '';
    const photo = (espnPlayer && espnPlayer.headshot) || (wiki && wiki.thumbnail) || '';
    const alreadySaved = isOnList(display);
    return (
      <div className="rounded-2xl overflow-hidden border border-white/15 shadow-lg" style={{ backgroundColor: 'rgba(0,0,0,0.55)' }}>
        <div className="px-5 py-3 text-center" style={{ background: 'linear-gradient(90deg, var(--pw-accent-2), var(--pw-accent))' }}>
          <p className="text-white font-black text-3xl">{display}</p>
          {espnPlayer && (espnPlayer.team || espnPlayer.position) && (<p className="text-white/90 text-xl">{[espnPlayer.team, espnPlayer.position].filter(Boolean).join(' • ')}</p>)}
        </div>
        <div className="p-4">
          <div className="flex gap-3 items-start mb-3">
            {photo ? <img src={photo} alt={display} className="w-20 h-20 rounded-full object-cover border-2 border-white/30 shrink-0" /> : <div className="w-20 h-20 rounded-full bg-black/40 flex items-center justify-center shrink-0 text-2xl text-white">?</div>}
            <div className="flex-1">
              {wiki && wiki.description && <p className="text-blue-200 text-xl italic">{wiki.description}</p>}
              {espnPlayer && espnPlayer.league && <p className="text-white/70 text-base mt-1">{espnPlayer.league.toUpperCase()}</p>}
            </div>
          </div>
          {wiki && wiki.extract && <p className="text-gray-100 text-xl leading-relaxed mb-3">{wiki.extract}</p>}
          {showSaveButton && (
            <div className="space-y-2">
              {alreadySaved ? <p className="text-green-300 text-xl text-center font-bold">Already saved</p> : <button onClick={savePlayer} disabled={loadingSave || !espnPlayer} className="w-full py-4 text-white rounded-xl font-bold text-2xl flex items-center justify-center gap-2 disabled:opacity-50" style={{ backgroundColor: 'var(--pw-accent)' }}><PlusIcon /> {loadingSave ? 'Saving...' : 'Save Player'}</button>}
              {!espnPlayer && <p className="text-yellow-300 text-base text-center">Pick a sport/league above to enable Save.</p>}
              <button onClick={clearSearch} className="w-full py-3 bg-white/10 border border-white/20 text-white/80 rounded-xl text-xl text-center">Clear Search</button>
            </div>
          )}
          <p className="text-gray-400 text-sm mt-3 text-center">Bio: Wikipedia. Stats: ESPN.</p>
        </div>
      </div>
    );
  };

  const Drawer = () => {
    if (!drawerData) return null;
    const { mode, name, meta, wiki, snapshot, loading: drawerLoading } = drawerData;
    const photo = (meta && meta.headshot) || (wiki && wiki.thumbnail) || '';
    const overview = snapshot ? snapshot.overview : null;
    return (
      <>
        <div className="modal-overlay" onClick={() => setDrawerData(null)} />
        <div className="modal-drawer">
          <div className="flex justify-between items-center px-4 pt-4 pb-2 border-b border-white/15">
            <h3 className="text-white font-bold text-2xl">{name}</h3>
            <button onClick={() => setDrawerData(null)} className="text-gray-400 hover:text-white text-2xl font-bold">X</button>
          </div>
          <div className="p-4">
            {drawerLoading && <div className="text-center py-8"><p className="text-white animate-pulse text-xl">Loading...</p></div>}
            {!drawerLoading && (
              <>
                <div className="px-4 py-3 rounded-xl mb-3 text-center" style={{ background: 'linear-gradient(90deg, var(--pw-accent-2), var(--pw-accent))' }}>
                  <p className="text-white font-black text-3xl">{name}</p>
                  {meta && (meta.team || meta.position) && (<p className="text-white/90 text-xl">{[meta.team, meta.position].filter(Boolean).join(' • ')}</p>)}
                </div>
                <div className="flex gap-3 items-start mb-3">
                  {photo ? <img src={photo} alt={name} className="w-20 h-20 rounded-full object-cover border-2 border-white/30 shrink-0" /> : <div className="w-20 h-20 rounded-full bg-black/40 flex items-center justify-center shrink-0 text-2xl text-white">?</div>}
                  <div className="flex-1">
                    {wiki && wiki.description && <p className="text-blue-200 text-xl italic">{wiki.description}</p>}
                    {meta && meta.league && <p className="text-white/70 text-base mt-1">{meta.league.toUpperCase()}</p>}
                  </div>
                </div>
                {wiki && wiki.extract && <p className="text-gray-100 text-xl leading-relaxed mb-3">{wiki.extract}</p>}
                {mode === 'watchlist' && (
                  <button onClick={checkForNewStats} disabled={checkingStats} className="w-full py-4 text-white rounded-xl font-bold text-2xl flex items-center justify-center gap-2 disabled:opacity-50 mt-2" style={{ backgroundColor: 'var(--pw-accent)' }}>
                    <RefreshIcon /> {checkingStats ? 'Checking...' : 'Check for new stats'}
                  </button>
                )}
                {mode === 'myplayers' && <StatPanel overview={overview} />}
                {mode === 'myplayers' && snapshot && snapshot.capturedAt && (<p className="text-white/40 text-sm text-center mt-3">Last updated {new Date(snapshot.capturedAt).toLocaleString()}</p>)}
                {mode === 'myplayers' && (<p className="text-gray-400 text-sm text-center mt-2">Bio: Wikipedia. Stats &amp; news: ESPN.</p>)}
              </>
            )}
            <button onClick={() => setDrawerData(null)} className="w-full py-4 bg-white/10 border border-white/20 text-white rounded-xl text-xl mt-4">Close</button>
          </div>
        </div>
      </>
    );
  };

  if (page === 'login') {
    return (
      <div style={{ minHeight: '100dvh', width: '100%', position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'stretch', paddingBottom: '2rem', backgroundColor: '#120520' }}>
        <div style={{ position: 'absolute', inset: 0, backgroundImage: 'url(' + SIGNIN_BG + ')', backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat', filter: 'var(--pw-signin-blur)', zIndex: 0 }} />
        <div style={{ position: 'absolute', inset: 0, backgroundColor: 'rgba(0,0,0,0.30)', zIndex: 1 }} />
        <div style={{ position: 'relative', zIndex: 2, display: 'flex', flexDirection: 'column', alignItems: 'stretch', flex: 1, justifyContent: 'flex-end' }}>
          <div style={{ textAlign: 'center', padding: '2rem 1.5rem 1rem' }}>
            <h1 style={{ color: '#fff', fontSize: isPhone ? '4rem' : '5.5rem', fontWeight: 900, fontFamily: "'Graduate', Georgia, serif", letterSpacing: '0.04em', lineHeight: 0.95, textShadow: '0 4px 16px rgba(0,0,0,0.9)', margin: 0 }}>PLAYER<br/>WATCH</h1>
            <p style={{ color: '#fff', fontSize: isPhone ? '1.2rem' : '1.5rem', textShadow: '0 2px 8px rgba(0,0,0,0.9)', marginTop: '1rem' }}>{TAGLINE_SUB}</p>
          </div>
          <div style={{ paddingLeft: '1.5rem', paddingRight: '1.5rem' }}>
            <div className="rounded-2xl p-4 shadow-2xl space-y-3" style={{ backgroundColor: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(8px)', borderColor: 'var(--pw-card-border)', borderWidth: '1px' }}>
              <input type="email" placeholder="Email address" value={email} onChange={(e) => setEmail(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && doAuth('login')} className="w-full px-4 py-3 rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400 text-xl" />
              <div className="relative">
                <input type={showPassword ? 'text' : 'password'} placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && doAuth('login')} className="w-full px-4 py-3 rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400 text-xl" />
                <button onClick={() => setShowPassword(!showPassword)} className="absolute right-3 top-1/2 -translate-y-1/2 text-white/60">{showPassword ? <EyeOffIcon /> : <EyeIcon />}</button>
              </div>
              {backendWaking && <p className="text-white/60 text-xl text-center animate-pulse">Waking up the server...</p>}
              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => doAuth('login')} disabled={loading} className="py-4 text-white font-bold rounded-xl disabled:opacity-50 text-2xl" style={{ backgroundColor: 'var(--pw-accent)' }}>{loading ? '...' : 'Sign In'}</button>
                <button onClick={() => doAuth('register')} disabled={loading} className="py-4 text-white font-bold rounded-xl disabled:opacity-50 text-2xl border" style={{ backgroundColor: 'rgba(0,51,160,0.4)', borderColor: 'rgba(255,255,255,0.4)' }}>{loading ? '...' : 'Register'}</button>
              </div>
              <p className="text-white/50 text-xl text-center">You'll stay signed in automatically</p>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <PageWrapper>
      <Drawer />
      <div className={containerClass}>

        {page === 'search' && (
          <div className="space-y-3" style={{ paddingTop: PT }}>
            <div className="flex flex-col items-center justify-center" style={{ height: PT, marginTop: '-' + PT, paddingTop: '0.5rem', pointerEvents: 'none' }}>
              <h1 className="text-white font-black text-center" style={{ fontSize: isPhone ? '3rem' : '4rem', textShadow: '0 4px 16px rgba(0,0,0,0.9)' }}>{APP_NAME}</h1>
              <p className="text-white text-center mt-2" style={{ fontSize: isPhone ? '1.6rem' : '2.2rem', whiteSpace: 'nowrap', textShadow: '0 2px 8px rgba(0,0,0,0.9)' }}>{TAGLINE}</p>
              <p className="text-white/90 text-center" style={{ fontSize: isPhone ? '1.0rem' : '1.2rem', textShadow: '0 1px 4px rgba(0,0,0,0.9)', marginTop: '0.4rem' }}>{TAGLINE_SUB}</p>
            </div>
            <div className={cardClass} style={Object.assign({}, cardStyle, { overflowY: 'auto', maxHeight: 'calc(100dvh - ' + PT + ' - 6rem)' })}>
              {searching && <p className="text-white text-center py-4 animate-pulse text-xl">Searching...</p>}
              {!searched ? (
                <div className="space-y-2">
                  <ClearableInput value={searchName} onChange={(e) => setSearchName(e.target.value)} onBlur={(e) => setSearchName(smartTitleCase(e.target.value.trim()))} onKeyPress={(e) => e.key === 'Enter' && doSearch()} placeholder="Player name" inputClass={iClass} />
                  <button onClick={doSearch} disabled={searching} className="w-full py-3 text-white rounded-lg flex items-center justify-center gap-2 disabled:opacity-50 text-2xl font-bold" style={{ backgroundColor: 'var(--pw-accent)' }}>
                    <SearchIcon /> {searching ? 'Searching...' : 'Find Player'}
                  </button>
                  <p className="text-gray-300 text-sm text-center">All major sports: NFL, NBA, MLB, NHL, MLS</p>
                </div>
              ) : (<SearchResultView />)}
            </div>
          </div>
        )}

        {page === 'watchlist' && (
          <div className="space-y-3" style={{ paddingTop: '1rem' }}>
            <div className={cardClass} style={cardStyle}>
              <CardPageHeader title="Watchlist" subtitle="Tap a name -- check for new stats" />
              {watchlist.length === 0 && (<div className="py-6 text-center"><p className="text-gray-200 text-xl leading-relaxed mb-2">No players yet.</p><p className="text-white text-xl font-medium">Use Search to add players.</p></div>)}
              {watchlist.length > 0 && (
                <div className="space-y-2 mt-2">
                  {watchlist.map(w => {
                    const meta = parseMeta(w.location);
                    return (
                      <div key={w.id} className="p-4 rounded-lg border bg-black/40 border-white/15">
                        <div className="flex items-center justify-between">
                          <div className="flex-1 min-w-0">
                            <button onClick={() => openWatchlistDrawer(w)} className="text-left w-full">
                              <h3 className="font-semibold text-2xl text-white underline decoration-dotted truncate">{w.name}</h3>
                            </button>
                            {meta && (meta.team || meta.position) && <p className="text-xl text-gray-300">{[meta.team, meta.position].filter(Boolean).join(' • ')}</p>}
                            {meta && meta.league && <p className="text-base text-white/60 uppercase">{meta.league}</p>}
                            <div className="flex items-center gap-1 mt-1"><CheckIcon /><span className="text-xl text-green-300">Watching</span></div>
                          </div>
                          <button onClick={() => delPlayer(w.id)} className="p-2 text-red-400 hover:bg-red-900/30 rounded-lg ml-2 shrink-0"><TrashIcon /></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'myplayers' && (
          <div className="space-y-3" style={{ paddingTop: '1rem' }}>
            <div className={cardClass} style={cardStyle}>
              <CardPageHeader title="My Players" subtitle="Your saved players and stats" />
              {watchlist.length === 0 ? (<div className="text-center py-6"><p className="text-gray-200 text-xl leading-relaxed">Search for a player and save them here.</p></div>) : (
                <div className="space-y-3">
                  <p className="text-gray-300 text-lg text-center mb-1">Tap a name to see latest stats</p>
                  {watchlist.map(w => {
                    const meta = parseMeta(w.location);
                    return (
                      <div key={w.id} className="p-4 bg-black/50 rounded-lg border border-white/15">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-3 flex-1 min-w-0">
                            {meta && meta.headshot ? <img src={meta.headshot} alt={w.name} className="w-14 h-14 rounded-full object-cover border border-white/20 shrink-0" /> : <div className="w-14 h-14 rounded-full bg-black/40 flex items-center justify-center shrink-0 text-xl text-white">?</div>}
                            <div className="flex-1 min-w-0">
                              <button onClick={() => openMyPlayersDrawer(w)} className="text-left w-full">
                                <h3 className="font-semibold text-2xl text-white underline decoration-dotted truncate">{w.name}</h3>
                              </button>
                              {meta && meta.team && <p className="text-base text-gray-300">{meta.team}</p>}
                              {meta && meta.position && <p className="text-base text-white/60">{meta.position}</p>}
                            </div>
                          </div>
                          <button onClick={() => delPlayer(w.id)} className="p-2 text-red-400 hover:bg-red-900/30 rounded-lg ml-2 shrink-0"><TrashIcon /></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'notifications' && (
          <div className="space-y-3" style={{ paddingTop: '1rem' }}>
            <div className={cardClass} style={cardStyle}>
              <CardPageHeader title="Alerts" subtitle="Trades, injuries, retirements, milestones" />
              {notifications.length === 0 ? (<div className="text-center py-4"><p className="text-white font-bold text-2xl">No alerts yet</p><p className="text-gray-200 text-xl mt-1">We check your players every 24 hours.</p></div>) : (
                <div className="space-y-3">
                  {notifications.map(n => (
                    <div key={n.id} className="p-3 bg-black/50 border border-white/15 rounded-xl">
                      <h3 className="font-bold text-white text-xl mb-1">{n.name}</h3>
                      <p className="text-gray-200 text-xl">{n.message}</p>
                      <p className="text-gray-400 text-base mt-1 mb-2">{new Date(n.created_at).toLocaleDateString()}</p>
                      <div className="flex gap-2">
                        <button onClick={() => viewAlert(n)} className="flex-1 py-2 text-white rounded-lg text-xl font-bold" style={{ backgroundColor: 'var(--pw-accent)' }}>View</button>
                        <button onClick={() => dismissAlert(n.id)} className="flex-1 py-2 bg-transparent border border-white/30 text-white/80 rounded-lg text-xl">Dismiss</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {page === 'about' && (
          <div className="space-y-4 pb-8" style={{ paddingTop: '1rem' }}>
            <div className={cardClass} style={cardStyle}>
              <div className="mb-3 pb-2 border-b border-white/15 text-center">
                <h2 className="text-4xl font-black text-white tracking-wide">About</h2>
                <h2 className="text-4xl font-black text-white tracking-wide">{APP_NAME}</h2>
              </div>
              <p className="text-white/80 italic text-xl text-center mb-3">v{APP_VERSION}</p>
              <div className="flex items-center gap-4 mb-4">
                <img src={BILL_PHOTO} alt="Bill Spencer" className="w-14 h-14 rounded-full object-cover border-2 border-white/30 shrink-0" />
                <div>
                  <p className="font-bold text-white text-xl">Bill Spencer</p>
                  <p className="text-white/70 italic text-xl">Founder</p>
                  <a href="mailto:hello@playerwatch.app" className="text-white/80 text-xl mt-1 block">hello@playerwatch.app</a>
                </div>
              </div>
              <p className="text-white text-2xl font-bold italic mb-3">{TAGLINE}</p>
              <div className="space-y-3 text-gray-100 text-xl leading-relaxed">
                <p>The players you care about, all in one place.</p>
                <p>Add anyone across the NFL, NBA, MLB, NHL, or MLS to your watchlist. Player Watch keeps tabs on the moves that matter -- trades, injuries, retirements, and milestones -- and tells you when something changes.</p>
                <p>No bloat. No noise. Just the players you picked.</p>
              </div>
            </div>
            <div className={cardClass} style={cardStyle}>
              <h3 className="text-white text-2xl font-bold mb-4 text-center">How it works</h3>
              <div className="space-y-4">
                <div className="flex gap-3 items-start"><span className="text-white text-2xl font-black w-7 shrink-0">1.</span><p className="text-gray-100 text-xl">Search for a player. We pull their bio from Wikipedia and stats from ESPN.</p></div>
                <div className="flex gap-3 items-start"><span className="text-white text-2xl font-black w-7 shrink-0">2.</span><p className="text-gray-100 text-xl">Save them with one tap. We capture their stats right away to your My Players page.</p></div>
                <div className="flex gap-3 items-start"><span className="text-white text-2xl font-black w-7 shrink-0">3.</span><p className="text-gray-100 text-xl">Tap a name on Watchlist to see their card and check for new stats.</p></div>
                <div className="flex gap-3 items-start"><span className="text-white text-2xl font-black w-7 shrink-0">4.</span><p className="text-gray-100 text-xl">Tap a name on My Players to see their latest saved stats.</p></div>
              </div>
            </div>
            <div className={cardClass} style={cardStyle}>
              <h3 className="font-bold text-white mb-1 text-2xl">Privacy</h3>
              <p className="text-white/60 text-xl mb-3">Last updated: April 2026</p>
              <div className="space-y-3 text-gray-100 text-xl leading-relaxed">
                <p><strong className="text-white">We collect:</strong> your email, watchlist, and search activity.</p>
                <p><strong className="text-white">We do not:</strong> sell your data, ever.</p>
                <p><strong className="text-white">Sources:</strong> Bio data from Wikipedia. Stats and player data from ESPN's public APIs.</p>
                <p><strong className="text-white">Your rights:</strong> Delete your account and all data anytime.</p>
                <a href="mailto:hello@playerwatch.app" className="text-white/80 text-xl">hello@playerwatch.app</a>
              </div>
            </div>
            <div className="px-1 space-y-3 pb-2">
              <div className="p-3 bg-black/40 rounded-xl"><p className="font-medium text-white text-xl text-center">{user && user.email}</p></div>
              <button onClick={doLogout} className="w-full py-4 text-white rounded-xl text-2xl font-bold" style={{ backgroundColor: 'var(--pw-accent)' }}>Sign Out</button>
              <button onClick={() => setShowDangerZone(!showDangerZone)} className="w-full py-3 text-white/60 text-xl text-center">{showDangerZone ? 'Hide' : 'Account Removal'}</button>
              {showDangerZone && (
                <div className="space-y-3">
                  {!showDeleteConfirm ? <button onClick={() => setShowDeleteConfirm(true)} className="w-full py-4 bg-black/60 border border-white/20 text-red-300 rounded-xl text-xl">Delete Account</button> : <div className="bg-black/80 border border-white/20 rounded-2xl p-5 space-y-3"><h3 className="font-bold text-red-300 text-xl">Are you sure?</h3><p className="text-white/80 text-xl">This permanently deletes your account.</p><button onClick={doDeleteAccount} className="w-full py-4 bg-red-700 text-white rounded-xl font-bold text-xl">Yes, Delete My Account</button><button onClick={() => { setShowDeleteConfirm(false); setShowDangerZone(false); }} className="w-full py-4 bg-white/10 border border-white/20 text-white rounded-xl text-xl">Cancel</button></div>}
                </div>
              )}
            </div>
            <p className="text-white/40 text-center text-sm pb-4">v{APP_VERSION}</p>
          </div>
        )}

      </div>

      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(8px)', borderTop: '1px solid rgba(255,255,255,0.15)', padding: '0.5rem 1rem', paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
        <div className="flex justify-around max-w-sm mx-auto">
          <button onClick={() => { clearSearch(); setPage('search'); }} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'search' ? 'text-white' : 'text-gray-400')}><SearchIcon /><span className="text-xl font-medium">Search</span></button>
          <button onClick={() => setPage('watchlist')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'watchlist' ? 'text-white' : 'text-gray-400')}><HeartIcon /><span className="text-xl font-medium">Watchlist</span></button>
          <button onClick={() => setPage('myplayers')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'myplayers' ? 'text-white' : 'text-gray-400')}>
            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
            <span className="text-xl font-medium">My Players</span>
          </button>
          <button onClick={() => setPage('about')} className={'flex flex-col items-center gap-0.5 px-1 py-1 ' + (page === 'about' ? 'text-white' : 'text-gray-400')}><InfoIcon /><span className="text-xl font-medium">Info</span></button>
          <button onClick={() => setPage('notifications')} className={'flex flex-col items-center gap-0.5 px-1 py-1 relative ' + (page === 'notifications' ? 'text-white' : 'text-gray-400')}>
            <BellIcon red={unreadCount > 0} />
            {unreadCount > 0 && <span className="absolute top-0 right-1 text-white text-xl font-bold rounded-full w-4 h-4 flex items-center justify-center" style={{ backgroundColor: 'var(--pw-accent-2)' }}>{unreadCount > 9 ? '9+' : unreadCount}</span>}
            <span className="text-xl font-medium">Alerts</span>
          </button>
        </div>
        <p className="text-center text-white/40 text-xs mt-1" style={{ display: page === 'search' ? 'none' : 'block' }}>app v{APP_VERSION} | api v{apiVersion}</p>
      </div>
    </PageWrapper>
  );

  function SearchResultView() {
    if (!searchResults) return null;
    const { wiki, espnPlayers, queryName } = searchResults;
    if (!selectedPlayer && espnPlayers.length > 1) {
      return (
        <div className="rounded-2xl overflow-hidden border border-white/15 shadow-lg" style={{ backgroundColor: 'rgba(0,0,0,0.55)' }}>
          <div className="px-5 py-3 bg-yellow-700 text-center"><p className="text-white font-black text-3xl">Multiple Players Found</p><p className="text-white/90 text-xl">Pick the right one</p></div>
          <div className="p-4 space-y-2">
            {espnPlayers.map((p, i) => (
              <button key={i} onClick={() => setSelectedPlayer(p)} className="w-full p-3 bg-black/40 border border-white/15 rounded-xl text-left">
                <div className="flex items-center gap-3">
                  {p.headshot ? <img src={p.headshot} alt={p.displayName} className="w-12 h-12 rounded-full object-cover border border-white/20 shrink-0" /> : <div className="w-12 h-12 rounded-full bg-black/40 flex items-center justify-center shrink-0 text-lg text-white">?</div>}
                  <div className="flex-1 min-w-0">
                    <p className="text-white text-2xl font-bold truncate">{p.displayName}</p>
                    <p className="text-white/70 text-xl truncate">{[p.team, p.position].filter(Boolean).join(' • ')}</p>
                    {p.league && <p className="text-white/50 text-base uppercase">{p.league}</p>}
                  </div>
                </div>
              </button>
            ))}
            <button onClick={clearSearch} className="w-full py-3 bg-white/10 border border-white/20 text-white/80 rounded-xl text-xl text-center mt-2">Clear Search</button>
          </div>
        </div>
      );
    }
    if (espnPlayers.length === 0) {
      return (
        <div className="rounded-2xl overflow-hidden border border-white/15 shadow-lg" style={{ backgroundColor: 'rgba(0,0,0,0.55)' }}>
          <div className="px-5 py-3 bg-blue-800 text-center"><p className="text-white font-black text-3xl">{queryName}</p><p className="text-white/90 text-xl">No ESPN match found</p></div>
          <div className="p-4">
            {wiki ? (<><PlayerCard wiki={wiki} espnPlayer={null} showSaveButton={false} /><p className="text-yellow-300 text-base text-center mt-3">Wikipedia bio shown above. ESPN couldn't match this name -- try a more specific spelling.</p></>) : (<p className="text-gray-200 text-xl text-center py-4">No results from Wikipedia or ESPN.</p>)}
            <button onClick={clearSearch} className="w-full py-3 bg-white/10 border border-white/20 text-white/80 rounded-xl text-xl text-center mt-2">Clear Search</button>
          </div>
        </div>
      );
    }
    return <PlayerCard wiki={wiki} espnPlayer={selectedPlayer || espnPlayers[0]} showSaveButton={true} />;
  }
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
