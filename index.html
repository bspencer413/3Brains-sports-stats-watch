<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1f2937">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Mealwatch">
<title>Mealwatch</title>
<meta name="description" content="Mealwatch — what's on your plate, before it's on your plate. Recall alerts for what's in your pantry.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://meal.watch">
<meta property="og:title" content="Mealwatch — Your pantry, watching your back.">
<meta property="og:description" content="Recall alerts for what's in your pantry.">
<meta property="og:url" content="https://meal.watch">
<meta property="og:type" content="website">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; font-family: Georgia, 'Times New Roman', serif; box-sizing: border-box; }
  html, body { height: 100%; overflow-x: hidden; margin: 0; padding: 0; background: #1c1f23; }
  .app-bg {
    background-image:
      linear-gradient(rgba(20,22,26,0.25), rgba(20,22,26,0.35)),
      url('https://raw.githubusercontent.com/bspencer413/mealwatch-frontend/main/steel_bg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }
  .pantry-bg-login {
    background-color: #0f1216;
    background-image:
      linear-gradient(rgba(15,18,22,0.45), rgba(15,18,22,0.65)),
      url('https://raw.githubusercontent.com/bspencer413/mealwatch-frontend/main/pantry_b2.jpg');
    background-size: 100% 100%;
    background-position: center center;
    background-repeat: no-repeat;
    background-attachment: scroll;
  }
  .pantry-page-bg {
    background-color: #0f1216;
    background-image:
      linear-gradient(rgba(15,18,22,0.55), rgba(15,18,22,0.7)),
      url('https://raw.githubusercontent.com/bspencer413/mealwatch-frontend/main/pantry_b2.jpg');
    background-size: 100% 100%;
    background-position: center center;
    background-repeat: no-repeat;
    background-attachment: scroll;
    min-height: 100vh;
  }
  .card-mw {
    background: linear-gradient(180deg, rgba(40,44,52,0.92) 0%, rgba(28,32,40,0.92) 100%);
    border: 1px solid rgba(180,188,200,0.25);
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 6px 18px rgba(0,0,0,0.45);
  }
  .card-recall {
    background: linear-gradient(180deg, rgba(60,64,72,0.85) 0%, rgba(40,42,48,0.85) 100%);
    border: 1px solid rgba(180,188,200,0.18);
  }
  .alert-pill { background: linear-gradient(180deg, #b91c1c 0%, #7f1d1d 100%); }
  .class-I { background: #b91c1c; }
  .class-II { background: #475569; }
  .class-III { background: #4b5563; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(180,188,200,0.3); border-radius: 3px; }
  .drawer-backdrop { background: rgba(0,0,0,0.6); }
  input, button, select, textarea { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_BASE = 'https://mealwatch-backend.onrender.com';
const APP_VERSION = '0.1.25';
const TOKEN_KEY = 'token';
const USER_KEY = 'user';
const BILL_PHOTO = 'https://raw.githubusercontent.com/bspencer413/memorial-watch/main/Bill.jpeg';

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getToken() {
  try { return localStorage.getItem(TOKEN_KEY); } catch (e) { return null; }
}
function getStoredUser() {
  try {
    const raw = localStorage.getItem(USER_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': 'Bearer ' + t } : {};
}
function jsonHeaders() {
  return Object.assign({ 'Content-Type': 'application/json' }, authHeaders());
}
function fmtDate(s) {
  if (!s) return '';
  if (/^\d{8}$/.test(s)) {
    return s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8);
  }
  if (typeof s === 'string' && s.length >= 10) return s.slice(0, 10);
  return s;
}
function classBadge(cls) {
  const c = (cls || '').toString().trim();
  if (c.startsWith('I') && !c.startsWith('II')) return { label: 'Class I', cls: 'class-I' };
  if (c.startsWith('II') && !c.startsWith('III')) return { label: 'Class II', cls: 'class-II' };
  if (c.startsWith('III')) return { label: 'Class III', cls: 'class-III' };
  if (c === '1' || c === 'I') return { label: 'Class I', cls: 'class-I' };
  return { label: c ? 'Class ' + c : 'Unclassified', cls: 'class-III' };
}

// ── PAGE HEADER (canonical MW pattern) ────────────────────────────────────────
function CardPageHeader(props) {
  return (
    <div className="mb-4 pb-3 border-b border-gray-600/40 text-center">
      <h2 className="text-4xl font-black text-white"
        style={{ letterSpacing: '0.06em', textTransform: 'uppercase', WebkitTextStroke: '1px #fff' }}>
        {props.title}
      </h2>
      {props.subtitle ? <p className="text-gray-200 text-xl mt-1">{props.subtitle}</p> : null}
    </div>
  );
}

// ── PAGE CARD WRAPPER (canonical MW pattern) ──────────────────────────────────
function PageCard(props) {
  return (
    <div className="px-3 flex justify-center items-center"
      style={{ minHeight: 'calc(100vh - 140px)', paddingTop: '1rem', paddingBottom: '140px' }}>
      <div className="card-mw rounded-2xl p-5 w-full max-w-2xl">
        {props.children}
      </div>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen(props) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  function submit() {
    setErr('');
    if (!email || !password) { setErr('Email and password required'); return; }
    if (mode === 'register' && password.length < 8) {
      setErr('Password must be at least 8 characters'); return;
    }
    setBusy(true);
    if (document.activeElement) document.activeElement.blur();
    const path = mode === 'register' ? '/auth/register' : '/auth/login';
    fetch(API_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
      .then(function(res) {
        setBusy(false);
        if (!res.ok) { setErr(res.d.detail || 'Auth failed'); return; }
        try {
          localStorage.setItem(TOKEN_KEY, res.d.token);
          localStorage.setItem(USER_KEY, JSON.stringify({ user_id: res.d.user_id, email: res.d.email }));
        } catch (e) {}
        props.onAuth({ user_id: res.d.user_id, email: res.d.email });
      })
      .catch(function() { setBusy(false); setErr('Network error'); });
  }

  return (
    <div className="pantry-bg-login min-h-screen flex flex-col items-center justify-center px-4 py-8 overflow-y-auto">
      <div className="w-full max-w-sm">
        <div className="card-mw rounded-2xl p-6">
          <CardPageHeader title="Mealwatch" subtitle="Your pantry, watching your back." />

          <div className="flex mb-5 rounded-xl overflow-hidden border border-white/30">
            <button onClick={function(){ setMode('login'); setErr(''); }}
              className={"flex-1 py-3 text-xl " + (mode === 'login' ? 'bg-white/20 text-white' : 'bg-transparent text-white/60')}>
              Sign In
            </button>
            <button onClick={function(){ setMode('register'); setErr(''); }}
              className={"flex-1 py-3 text-xl " + (mode === 'register' ? 'bg-white/20 text-white' : 'bg-transparent text-white/60')}>
              Create Account
            </button>
          </div>

          <input type="email" placeholder="Email address" value={email}
            onChange={function(e){ setEmail(e.target.value); }}
            onFocus={function(e){
              setTimeout(function(){
                if (e.target && e.target.scrollIntoView) e.target.scrollIntoView({ block: 'center', behavior: 'smooth' });
              }, 300);
            }}
            autoComplete="email"
            className="w-full mb-3 px-4 py-3 text-xl rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          <input type="password" placeholder="Password" value={password}
            onChange={function(e){ setPassword(e.target.value); }}
            onFocus={function(e){
              setTimeout(function(){
                if (e.target && e.target.scrollIntoView) e.target.scrollIntoView({ block: 'center', behavior: 'smooth' });
              }, 300);
            }}
            onKeyDown={function(e){ if (e.key === 'Enter') submit(); }}
            autoComplete={mode === 'register' ? 'new-password' : 'current-password'}
            className="w-full mb-4 px-4 py-3 text-xl rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400" />

          {err ? <p className="text-red-300 text-xl mb-3 text-center">{err}</p> : null}

          <button onClick={submit} disabled={busy}
            className="w-full py-4 rounded-xl bg-white text-gray-900 text-2xl font-bold hover:bg-gray-100 disabled:opacity-50">
            {busy ? '...' : (mode === 'register' ? 'Create Account' : 'Sign In')}
          </button>

          <p className="text-white/50 text-base text-center mt-3">You'll stay signed in automatically</p>
        </div>

        <p className="text-white text-xs bg-black/40 px-3 py-1 rounded-full inline-block mt-6 mx-auto block w-fit">
          app v{APP_VERSION}
        </p>
      </div>
    </div>
  );
}

// ── RECALL CARD ───────────────────────────────────────────────────────────────
function RecallCard(props) {
  const r = props.recall;
  const badge = classBadge(r.classification);
  return (
    <div className="card-recall rounded-lg p-4 mb-3">
      <div className="flex items-start justify-between gap-2 mb-2">
        <div className="flex-1">
          <h3 className="text-white font-bold text-xl">{r.brand || 'Unknown brand'}</h3>
          <p className="text-white text-sm mt-1">{r.product_description || ''}</p>
        </div>
        <span className={"text-white text-xs px-2 py-1 rounded font-bold whitespace-nowrap " + badge.cls}>
          {badge.label}
        </span>
      </div>
      {r.reason ? <p className="text-white text-sm mb-2"><span className="font-semibold">Reason:</span> {r.reason}</p> : null}
      {r.distribution ? <p className="text-white text-sm mb-2"><span className="font-semibold">Distribution:</span> {r.distribution}</p> : null}
      <div className="flex justify-between text-gray-400 text-xs mt-2">
        <span>{fmtDate(r.recall_date)}</span>
        <span>{r.source ? r.source.toUpperCase() : ''}</span>
      </div>
      {props.children ? <div className="mt-3 flex gap-2">{props.children}</div> : null}
    </div>
  );
}

// ── ADD TO WATCHLIST BUTTON (single button, only path from search) ────────────
function AddToWatchlistButton(props) {
  const [busy, setBusy] = useState(false);
  const [state, setState] = useState(null); // 'added' | 'duplicate'

  function add() {
    if (!props.brand) return;
    setBusy(true);
    fetch(API_BASE + '/watchlist', {
      method: 'POST',
      headers: jsonHeaders(),
      body: JSON.stringify({
        brand: props.brand,
        product_name: props.product_name || null,
        upc: props.upc || null,
        monitoring: true
      })
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        setBusy(false);
        setState(d.duplicate ? 'duplicate' : 'added');
        if (props.onSaved) props.onSaved(d);
      })
      .catch(function() { setBusy(false); });
  }

  if (state === 'added') {
    return <p className="text-emerald-300 text-xl font-bold">✓ Added to Watchlist</p>;
  }
  if (state === 'duplicate') {
    return <p className="text-white text-xl">Already on your Watchlist or Pantry</p>;
  }
  return (
    <button onClick={add} disabled={busy}
      className="w-full py-4 text-2xl rounded-xl bg-white text-gray-900 font-bold hover:bg-gray-100 disabled:opacity-50">
      Add to Watchlist
    </button>
  );
}

// ── LATEST RECALLS VIEW ───────────────────────────────────────────────────────
function LatestRecallsView(props) {
  const [items, setItems] = useState(null);
  const [busy, setBusy] = useState(true);

  useEffect(function() {
    setBusy(true);
    fetch(API_BASE + '/recalls/recent?limit=25')
      .then(function(r) { return r.json(); })
      .then(function(d) { setItems(d.results || []); setBusy(false); })
      .catch(function() { setBusy(false); setItems([]); });
  }, []);

  return (
    <PageCard>
      <CardPageHeader title="Latest Recalls" subtitle="Class I & II FDA recalls, newest first" />
      <div className="mb-4 text-center">
        <button onClick={props.onBack}
          className="text-base px-4 py-2 rounded bg-gray-700 text-white border border-gray-500 hover:bg-gray-600">
          ← Back to Search
        </button>
      </div>
      {busy ? (
        <p className="text-white text-base text-center">Loading…</p>
      ) : (items === null || items.length === 0) ? (
        <p className="text-white text-base text-center">No recent Class I/II recalls available.</p>
      ) : items.map(function(r) {
        return (
          <RecallCard key={r.id} recall={r}>
            <AddToWatchlistButton brand={r.brand} product_name={null} upc={r.upc || null} />
          </RecallCard>
        );
      })}
      <div className="mt-4 text-center">
        <button onClick={props.onBack}
          className="text-base px-4 py-2 rounded bg-gray-700 text-white border border-gray-500 hover:bg-gray-600">
          ← Back to Search
        </button>
      </div>
    </PageCard>
  );
}

// ── SEARCH PAGE ───────────────────────────────────────────────────────────────
function SearchPage() {
  const [q, setQ] = useState('');
  const [searchedTerm, setSearchedTerm] = useState('');
  const [results, setResults] = useState(null);
  const [suggestions, setSuggestions] = useState([]);
  const [busy, setBusy] = useState(false);
  const [showLatest, setShowLatest] = useState(false);
  const [confirmedSave, setConfirmedSave] = useState(false);

  function doSearch(overrideQ) {
    const query = ((overrideQ != null ? overrideQ : q) || '').trim();
    if (query.length < 2) return;
    if (overrideQ != null) setQ(overrideQ);
    if (document.activeElement) document.activeElement.blur(); // dismiss keyboard
    setBusy(true);
    setSuggestions([]);
    setSearchedTerm(query);
    setConfirmedSave(false);
    fetch(API_BASE + '/search?q=' + encodeURIComponent(query))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        setResults(d.results || []);
        if ((d.results || []).length === 0) {
          return fetch(API_BASE + '/suggest?q=' + encodeURIComponent(query))
            .then(function(r) { return r.json(); })
            .then(function(s) { setSuggestions(s.suggestions || []); });
        }
      })
      .then(function() { setBusy(false); })
      .catch(function() { setBusy(false); setResults([]); });
  }

  if (showLatest) {
    return <LatestRecallsView onBack={function(){ setShowLatest(false); }} />;
  }

  return (
    <PageCard>
      <CardPageHeader title="Search Recalls" subtitle="Type a brand or product to check FDA recalls" />

      <div className="flex gap-2 mb-3">
        <input value={q} onChange={function(e){ setQ(e.target.value); }}
          onKeyDown={function(e){ if (e.key === 'Enter') doSearch(); }}
          placeholder="e.g., Reser's, tuna, Cheerios"
          className="flex-1 px-4 py-3 text-xl rounded-xl bg-white/15 border border-white/30 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <button onClick={function(){ doSearch(); }} disabled={busy}
          className="px-5 py-3 text-xl rounded-xl bg-white text-gray-900 font-bold hover:bg-gray-100 disabled:opacity-50">
          {busy ? '...' : 'Search'}
        </button>
      </div>

      <div className="text-center mb-5">
        <button onClick={function(){ setShowLatest(true); }}
          className="w-full py-4 text-2xl rounded-xl bg-white/15 text-white font-bold border border-white/30 hover:bg-white/20">
          🆕 See Latest Recalls →
        </button>
      </div>

      {results === null ? null
        : results.length === 0 ? (
        <div>
          <div className="card-recall rounded-lg p-5 mb-3 text-center">
            <p className="text-emerald-300 text-2xl font-bold mb-1">No active recalls</p>
            <p className="text-white text-base">
              Nothing in the FDA database for <span className="font-semibold">"{searchedTerm}"</span>.
            </p>
          </div>

          <div className="card-recall rounded-lg p-4 text-center">
            {!confirmedSave ? (
              <div>
                <p className="text-white text-base mb-3">
                  Want to be alerted if <span className="font-semibold">"{searchedTerm}"</span> is recalled later?
                </p>
                <AddToWatchlistButton brand={searchedTerm} />
                {suggestions.length > 0 ? (
                  <div className="mt-5 pt-4 border-t border-gray-600/40">
                    <p className="text-white text-sm mb-2">Or did you mean:</p>
                    <div className="flex flex-wrap gap-2 justify-center">
                      {suggestions.map(function(s, i) {
                        return (
                          <button key={i} onClick={function(){ doSearch(s.brand); }}
                            className="text-sm px-3 py-1.5 rounded bg-gray-700 text-white border border-gray-500 hover:bg-gray-600">
                            {s.brand}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ) : null}
              </div>
            ) : null}
          </div>
        </div>
      ) : (
        <div>
          <p className="text-white text-base text-center mb-3">{results.length} recall{results.length === 1 ? '' : 's'} found for "{searchedTerm}"</p>
          {results.map(function(r) {
            return (
              <RecallCard key={r.id} recall={r}>
                <AddToWatchlistButton brand={r.brand} product_name={null} upc={r.upc || null} />
              </RecallCard>
            );
          })}
        </div>
      )}
    </PageCard>
  );
}

// ── DRAWER ────────────────────────────────────────────────────────────────────
function ItemDrawer(props) {
  const item = props.item;
  const [recall, setRecall] = useState(null);
  const [hasRecall, setHasRecall] = useState(item.has_recall);
  const [busy, setBusy] = useState(true);
  const [lastChecked, setLastChecked] = useState(item.last_checked);

  useEffect(function() {
    setBusy(true);
    fetch(API_BASE + '/watchlist/' + item.id + '/refresh', { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        setBusy(false);
        setRecall(d.recall || null);
        setHasRecall(d.has_recall);
        setLastChecked(d.last_checked);
      })
      .catch(function() { setBusy(false); });
  }, [item.id]);

  function copyTo(monitoring) {
    // Add a NEW row in the other list. Original stays put.
    fetch(API_BASE + '/watchlist', {
      method: 'POST',
      headers: jsonHeaders(),
      body: JSON.stringify({
        brand: item.brand,
        product_name: item.product_name || null,
        upc: item.upc || null,
        monitoring: monitoring
      })
    })
      .then(function(r) { return r.json(); })
      .then(function() {
        if (props.onChanged) props.onChanged();
        props.onClose();
      });
  }

  function deleteItem() {
    fetch(API_BASE + '/watchlist/' + item.id, {
      method: 'DELETE',
      headers: authHeaders()
    })
      .then(function() {
        if (props.onChanged) props.onChanged();
        props.onClose();
      });
  }

  // From Watchlist (monitoring=true): trash + Save to Pantry
  // From Pantry (monitoring=false): trash + Move to Watchlist
  return (
    <div className="fixed inset-0 z-50 drawer-backdrop flex items-end justify-center" onClick={props.onClose}>
      <div className="card-mw rounded-t-2xl w-full max-w-lg p-5 max-h-[85vh] overflow-y-auto scrollbar-thin"
        onClick={function(e){ e.stopPropagation(); }}>
        <div className="flex items-start justify-between mb-2">
          <div className="flex-1">
            <h3 className="text-white text-2xl font-bold">{item.brand}</h3>
            {item.product_name ? <p className="text-white text-base">{item.product_name}</p> : null}
            {item.upc ? <p className="text-white text-sm mt-1">UPC: {item.upc}</p> : null}
          </div>
          <button onClick={props.onClose} className="text-white hover:text-gray-300 text-3xl leading-none px-2">×</button>
        </div>

        <p className="text-white text-sm mb-4">
          {busy ? 'Rechecking…' : (lastChecked ? 'Last checked ' + fmtDate(lastChecked) : '')}
        </p>

        {busy ? (
          <p className="text-white text-base py-4 text-center">Looking up latest recalls…</p>
        ) : hasRecall && recall ? (
          <div>
            <p className="text-red-300 text-lg font-bold mb-2">⚠ Recall match found</p>
            <RecallCard recall={recall} />
          </div>
        ) : (
          <div className="card-recall rounded-lg p-4 mb-3 text-center">
            <p className="text-emerald-300 text-xl font-bold">No active recalls</p>
            <p className="text-white text-base mt-1">No FDA recall currently matches this item.</p>
          </div>
        )}

        <div className="flex flex-wrap gap-2 mt-4">
          {item.monitoring ? (
            <button onClick={function(){ copyTo(false); }}
              className="flex-1 py-4 text-xl rounded-xl bg-white/15 text-white font-bold border border-white/30 hover:bg-white/20">
              Save to Pantry
            </button>
          ) : null}
          <button onClick={deleteItem}
            className="flex-1 py-4 text-xl rounded-xl bg-red-900/60 text-white font-bold border border-red-600 hover:bg-red-800/70">
            🗑 Remove
          </button>
        </div>
      </div>
    </div>
  );
}

// ── WATCHLIST PAGE ────────────────────────────────────────────────────────────
function WatchlistPage(props) {
  const monitoring = props.items.filter(function(i){ return i.monitoring; });
  return (
    <PageCard>
      <CardPageHeader title={"Your Watchlist (" + monitoring.length + ")"} subtitle="Items we check every 12 hours" />
      {monitoring.length === 0 ? (
        <p className="text-white text-base text-center py-6">
          Nothing on your Watchlist yet. Search for a brand and tap Add to Watchlist.
        </p>
      ) : (
        monitoring.map(function(item) {
          return (
            <button key={item.id} onClick={function(){ props.onOpen(item); }}

              <div className="flex items-start justify-between gap-2">

      )}

}

// ── PANTRY PAGE ───────────────────────────────────────────────────────────────
function PantryPage(props) {

// ── ALERTS PAGE ───────────────────────────────────────────────────────────────
function AlertsPage(props) {
  const [items, setItems] = useState([]);
  const [busy, setBusy] = useState(true);

  function load() {
    setBusy(true);
    fetch(API_BASE + '/notifications', { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(d) { setItems(d.items || []); setBusy(false); })
      .catch(function() { setBusy(false); });
  }
  useEffect(load, []);

  function dismiss(id) {
    fetch(API_BASE + '/notifications/' + id, { method: 'DELETE', headers: authHeaders() })
      .then(load);
  }

  return (
    <PageCard>
      <CardPageHeader title={"Alerts (" + items.length + ")"} subtitle="New recall matches on your Watchlist" />
      {busy ? <p className="text-white text-base text-center">Loading…</p> :
        items.length === 0 ? (
          <p className="text-emerald-300 text-xl font-bold text-center py-4">All clear</p>
        ) : items.map(function(n) {
          return (
            <div key={n.id} className="card-recall rounded-lg p-4 mb-3 border-l-4 border-red-600">
              <h3 className="text-white text-xl font-bold mb-1">{n.brand}{n.product_name ? ' · ' + n.product_name : ''}</h3>
              <p className="text-white text-base mb-3">{n.message}</p>
              <div className="flex gap-2">
                <button onClick={function(){ dismiss(n.id); }}
                  className="text-base px-4 py-2 rounded bg-gray-700 text-white border border-gray-500 hover:bg-gray-600">
                  Dismiss
                </button>
              </div>
              <p className="text-white text-xs mt-2">{fmtDate(n.created_at)}</p>
            </div>
          );
        })
      }
    </PageCard>
  );
}

function BottomNav(props) {
  const tabs = [
    { id: 'search',    label: 'Search'    },
    { id: 'watchlist', label: 'Watchlist' },
    { id: 'pantry',    label: 'Pantry'    },
    { id: 'about',     label: 'Info'      },
    { id: 'alerts',    label: 'Alerts'    }
  ];
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      backgroundColor: 'rgba(0,0,0,0.85)',
      backdropFilter: 'blur(8px)',
      borderTop: '1px solid rgba(255,255,255,0.15)',
      padding: '0.5rem 0.75rem',
      paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))',
      zIndex: 40
    }}>
      <div className="flex justify-around max-w-2xl mx-auto">
        {tabs.map(function(t) {
          const active = props.page === t.id;
          const isAlerts = t.id === 'alerts';
          const cls = "flex flex-col items-center gap-0.5 px-1 py-1 relative " + (active ? "text-white" : "text-gray-400");
          return (
            <button key={t.id} className={cls}
              onClick={function(){ props.onChange(t.id); }}>
              <NavIcon id={t.id} />
              {isAlerts && props.alertCount > 0 ? (
                <span className="absolute top-0 right-0 bg-red-600 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">
                  {props.alertCount > 9 ? '9+' : props.alertCount}
                </span>
              ) : null}
              <span className="text-xl font-medium">{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [apiVersion, setApiVersion] = useState('...');
  const [page, setPage] = useState('search');
  const [items, setItems] = useState([]);
  const [drawerItem, setDrawerItem] = useState(null);
  const [alertCount, setAlertCount] = useState(0);

  // Cold-start: fetch health, then hydrate auth from localStorage. Mirrors MW canonical.
  useEffect(function() {
    fetch(API_BASE + '/health')
      .then(function(r) { return r.json(); })
      .then(function(d) { setApiVersion(d.version || '?'); })
      .catch(function() { setApiVersion('offline'); });

    try {
      const t = localStorage.getItem(TOKEN_KEY);
      const u = localStorage.getItem(USER_KEY);
      if (t && u) {
        setUser(JSON.parse(u));
      }
    } catch (e) {}
  }, []);

  function loadWatchlist() {
    if (!getToken()) return;
    fetch(API_BASE + '/watchlist', { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(d) { setItems(d.items || []); })
      .catch(function() {});
  }
  function loadAlertCount() {
    if (!getToken()) return;
    fetch(API_BASE + '/notifications', { headers: authHeaders() })
      .then(function(r) { return r.json(); })
      .then(function(d) { setAlertCount((d.items || []).length); })
      .catch(function() {});
  }

  useEffect(function() {
    if (user) {
      loadWatchlist();
      loadAlertCount();
    }
  }, [user]);

  // Refresh on tab change to keep counts/lists current, but kicked off async.
  // setTimeout(0) yields the render frame so the nav switch feels instant.
  useEffect(function() {
    if (!user) return;
    const t = setTimeout(function() {
      loadWatchlist();
      loadAlertCount();
    }, 0);
    return function(){ clearTimeout(t); };
  }, [page]);

  function handleAuth(u) {
    setUser(u);
    setPage('search'); // explicit: land on search after login
  }

  function handleLogout() {
    setUser(null);
    setPage('search');
  }

  function handleNavChange(newPage) {
    if (document.activeElement) document.activeElement.blur(); // dismiss keyboard
    setPage(newPage);
  }

  if (!user) {
    return <LoginScreen onAuth={handleAuth} />;
  }

  return (
    <div className="app-bg min-h-screen">
      <main>
        {page === 'search' && <SearchPage />}
        {page === 'watchlist' && <WatchlistPage items={items} onOpen={setDrawerItem} />}
        {page === 'pantry' && <PantryPage items={items} onOpen={setDrawerItem} />}
        {page === 'about' && <AboutPage email={user.email} onLogout={handleLogout} />}
        {page === 'alerts' && <AlertsPage />}
      </main>

      <BottomNav page={page} onChange={handleNavChange} alertCount={alertCount} />

      {drawerItem ? (
        <ItemDrawer item={drawerItem}
          onClose={function(){ setDrawerItem(null); }}
          onChanged={function(){ loadWatchlist(); loadAlertCount(); }} />
      ) : null}

      <p className="fixed bottom-32 left-1/2 -translate-x-1/2 text-white text-xs bg-black/50 px-3 py-1 rounded-full z-30">
        app v{APP_VERSION} · api v{apiVersion}
      </p>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
